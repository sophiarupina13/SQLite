<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main>
    <section class="container">
      <form class="section-form" action="/login" method="POST">
        <label for="name" class="section-form-lbl">Введите имя</label>
        <input class="section-form-inpt" placeholder="Иван Иванов" type="text" name="name" required>
        <label for="password" class="section-form-lbl">Введите пароль</label>
        <input class="section-form-inpt" placeholder="example123" type="text" name="password" required>
        <button type="submit" class="section-form-btn" title="Войти">Войти</button>
    </form>
    </section>
  </main>
</body>
</html>
